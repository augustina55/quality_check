<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quality Check</title>
  <style>
    body { margin:0; font-family: Arial; background:#f4f6f9; }

    .navbar {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      background:#D4AF73;
      color:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px 30px;
      box-sizing:border-box;
      z-index:1000;
    }

    .logo { font-size:18px; font-weight:bold; }

    .menu { display:flex; gap:25px; }
    .menu a { color:white; text-decoration:none; cursor:pointer; font-size:14px; }

    .container { padding:100px 30px 30px; }

    .main { display:flex; gap:20px; }

    .left {
      width:42%;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      position:sticky;
      top:100px;
      height:fit-content;
    }

    .right {
      width:58%;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      max-height:calc(100vh - 140px);
      overflow-y:auto;
    }

    label {
      display:block;
      font-weight:600;
      margin:10px 0 5px;
      color:#333;
    }

    input, textarea, select {
      width:100%;
      padding:12px;
      margin:0 0 12px;
      border-radius:6px;
      border:1px solid #ddd;
      box-sizing:border-box;
      font-size:14px;
    }

    input:focus, textarea:focus, select:focus {
      outline:none;
      border-color:#C9A764;
      box-shadow:0 0 5px rgba(201,167,100,0.3);
    }

    h2, h3 { margin-top:0; margin-bottom:15px; }

    /* FORM GRID */
    .form-row {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:20px;
      margin-bottom:10px;
    }

    .form-row > div {
      display:flex;
      flex-direction:column;
    }

    /* CHECKLIST */
    .checkbox-group {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px 20px;
      margin-top:5px;
      margin-bottom:15px;
      padding:10px 0;
    }

    .checkbox-item {
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:flex-start;
      padding:3px 0;
    }

    .checkbox-item input[type="checkbox"] {
      width:auto;
      margin:0;
      cursor:pointer;
    }

    /* RATING + ADHERENCE */
    .bottom-row {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:20px;
      margin-bottom:10px;
    }

    .bottom-row > div {
      display:flex;
      flex-direction:column;
    }

    textarea {
      height:200px;
    }

    button {
      padding:12px 20px;
      background:#C9A764;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      width:100%;
      font-size:15px;
      margin-top:10px;
      font-weight:600;
      transition:background 0.3s ease;
    }

    button:hover {
      background:#E8D4A8;
      color:#333;
    }

    iframe, video {
      width:100%;
      height:260px;
      border-radius:8px;
      border:none;
      background:black;
    }

  </style>
</head>
<body>

<div class="navbar">
  <div class="logo"></div>
  <div class="menu">
    <a onclick="showSection('qc')">Quality Check</a>
  </div>
</div>

<div class="container">

  <div id="qcSection">
    <div class="main">

      <div class="left">
        <h3>Video Input</h3>
        <input type="text" id="videoLink" placeholder="Paste video link (YouTube / MP4)">
        <button onclick="loadVideo()">Load Video</button>
        <br><br>

        <iframe id="ytPlayer" style="display:none"></iframe>
        <video id="videoPlayer" controls style="display:none"></video>
      </div>

      <div class="right">
        <h2>Quality Check Form</h2>

        <!-- Row 1 -->
        <div class="form-row">
          <div>
            <label>Coach Name <span style="color:red;">*</span></label>
            <input type="text" id="coachName" required>
          </div>
          <div>
            <label>Webinar Date <span style="color:red;">*</span></label>
            <input type="date" id="webinarDate" required>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="form-row">
          <div>
            <label>Batch Code <span style="color:red;">*</span></label>
            <input type="text" id="batchCode" required>
          </div>
          <div>
            <label>Reviewed By <span style="color:red;">*</span></label>
            <select id="reviewedBy" required>
              <option value="">Select Reviewer</option>
              <option value="Augustin">Augustin</option>
              <option value="Mrinalini">Mrinalini</option>
              <option value="Priyangsu">Priyangsu</option>
              <option value="Vasishta">Vasishta</option>
              <option value="Anirudh">Anirudh</option>
            </select>
          </div>
        </div>

        <h3>Checklist</h3>
        <div class="checkbox-group" id="checklist">
          <div class="checkbox-item"><input type="checkbox"> Warm greetings</div>
          <div class="checkbox-item"><input type="checkbox"> CCL Leaderboard</div>

          <div class="checkbox-item"><input type="checkbox"> Assignments</div>
          <div class="checkbox-item"><input type="checkbox"> Revision</div>

          <div class="checkbox-item"><input type="checkbox"> Concept Explanation</div>
          <div class="checkbox-item"><input type="checkbox"> Active Puzzle</div>

          <div class="checkbox-item"><input type="checkbox"> Share screen to show solution</div>
          <div class="checkbox-item"><input type="checkbox"> Camera</div>

          <div class="checkbox-item"><input type="checkbox"> Game play</div>
          <div class="checkbox-item"><input type="checkbox"> Tournament</div>
        </div>

        <!-- Bottom Row -->
        <div class="bottom-row">
          <div>
            <label>Rating</label>
            <select id="rating">
              <option>10</option>
              <option>9</option>
              <option>8</option>
              <option>7</option>
              <option>6</option>
              <option>5</option>
              <option>4</option>
              <option>3</option>
              <option>2</option>
              <option>1</option>
            </select>
          </div>
          <div>
            <label>Adherence</label>
            <input type="text" id="adherence" readonly>
          </div>
        </div>

        <label>Comments</label>
        <textarea id="comments"></textarea>

        <button onclick="submitForm()">Submit</button>
      </div>

    </div>
  </div>

  <div id="rankingSection" style="display:none"><h2>Coach Ranking (Coming Soon)</h2></div>
  <div id="qualitySection" style="display:none"><h2>Coach Quality (Coming Soon)</h2></div>

</div>

<script>
function showSection(type){
  document.getElementById('qcSection').style.display = (type==='qc') ? 'block':'none';
  document.getElementById('rankingSection').style.display = (type==='ranking') ? 'block':'none';
  document.getElementById('qualitySection').style.display = (type==='quality') ? 'block':'none';
}

function loadVideo() {
  let link = document.getElementById("videoLink").value;
  let yt = document.getElementById("ytPlayer");
  let vid = document.getElementById("videoPlayer");

  yt.style.display = "none";
  vid.style.display = "none";

  try {
    if(link.includes("youtube.com") || link.includes("youtu.be")) {
      let id = link.split("v=")[1] || link.split("/").pop();
      yt.src = "https://www.youtube.com/embed/" + id;
      yt.style.display = "block";
    } else if(link.endsWith(".mp4") || link.includes(".mp4?")) {
      vid.src = link;
      vid.style.display = "block";
    } else {
      throw "Invalid link";
    }
  } catch (e) {
    alert("Error loading video");
  }
}

const checkboxes = document.querySelectorAll('#checklist input');
checkboxes.forEach(cb => {
  cb.addEventListener('change', () => {
    let checked = document.querySelectorAll('#checklist input:checked').length;
    document.getElementById('adherence').value = checked * 10;
  });
});

function submitForm() {
  // Validate required fields
  let coachName = document.getElementById("coachName").value.trim();
  let webinarDate = document.getElementById("webinarDate").value.trim();
  let batchCode = document.getElementById("batchCode").value.trim();
  let reviewedBy = document.getElementById("reviewedBy").value.trim();

  if (!coachName) {
    alert("⚠️ Coach Name is required");
    return;
  }
  if (!webinarDate) {
    alert("⚠️ Webinar Date is required");
    return;
  }
  if (!batchCode) {
    alert("⚠️ Batch Code is required");
    return;
  }
  if (!reviewedBy) {
    alert("⚠️ Reviewed By is required");
    return;
  }

  let checklist = {};

  document.querySelectorAll('#checklist .checkbox-item').forEach(item => {
    let label = item.innerText.trim();
    let checked = item.querySelector("input").checked;
    checklist[label] = checked ? "YES" : "NO";
  });

  let data = {
    coachName: coachName,
    webinarDate: webinarDate,
    batchCode: batchCode,
    reviewedBy: reviewedBy,
    rating: document.getElementById("rating").value,
    adherence: document.getElementById("adherence").value,
    comments: document.getElementById("comments").value,
    checklist: checklist
  };

  fetch("https://script.google.com/macros/s/AKfycbz1L7_8k0uhN6JeCnN3_QzouOKaJsQdcGYsqLVRoazZthxeKzzLnPlaL2mb2Ydn7rYiWg/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert("Saved successfully ✅");
  })
  .catch(err => {
    alert("Error saving ❌");
  });
}
</script>

</body>
</html>
